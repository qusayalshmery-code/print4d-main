<script>
// === حماية كرة MiniMax ===
(function() {
  const style = document.createElement('style');
  style.textContent = '#minimax-floating-ball, [class*="minimax"], [class*="MiniMax"] { display: none !important; }';
  document.head.appendChild(style);
  
  const observer = new MutationObserver(() => {
    document.querySelectorAll('[class*="minimax"], [class*="MiniMax"]').forEach(el => el.remove());
  });
  observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
